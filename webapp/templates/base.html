<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DITO{% endblock %} · DITO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/dito.css') }}" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('dashboard.index') }}">DITO</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.index') }}">Centro de control</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('history.index') }}">Desglose</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('alerts.index') }}">Alertas</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('actions.index') }}">Acciones</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('reports.index') }}">Reportes</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.index') }}">Admin</a></li>
      </ul>
      {% block nav_right %}{% endblock %}
    </div>
  </div>
</nav>
<main class="container-fluid py-4">
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
